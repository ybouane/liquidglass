<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass — Library Demo</title>
<script type="importmap">
{
	"imports": {
		"html-to-image": "https://esm.sh/html-to-image@1.11.11"
	}
}
</script>
<style>
	*, *::before, *::after {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
	}
	body, html {
		width: 100%;
		height: 100%;
		overflow: hidden;
		font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
	}

	/* ── Root container ── */
	#liquid-glass-root {
		position: relative;
		width: 100vw;
		height: 100vh;
		overflow: hidden;
	}

	/* ── Background image (non-glass, drawn directly via drawImage) ── */
	.background-img {
		position: absolute;
		inset: 0;
		width: 100%;
		height: 100%;
		object-fit: cover;
	}

	/* ── Dynamic bubbles canvas ── */
	#bubbles-canvas {
		position: absolute;
		inset: 0;
		width: 100%;
		height: 100%;
	}

	.main-content {
		position: absolute;
		inset: 0;
	}
	.main-content h1 {
		position: absolute;
		top: 8%;
		left: 50%;
		transform: translateX(-50%);
		color: #fff;
		font-size: 3em;
		font-weight: 700;
		text-shadow: 0 2px 16px rgba(0,0,0,0.5);
	}
	.main-content .subtitle {
		position: absolute;
		top: 17%;
		left: 50%;
		transform: translateX(-50%);
		color: rgba(255,255,255,0.7);
		font-size: 1.2em;
		text-shadow: 0 1px 8px rgba(0,0,0,0.4);
	}

	/* ── Static decorative layer (non-glass, static) ── */
	.decoration {
		position: absolute;
		bottom: 40px;
		left: 50%;
		transform: translateX(-50%);
		color: rgba(255,255,255,0.4);
		font-size: 0.9em;
		z-index: 0;
	}

	/* ── Glass elements ── */
	.glass-panel {
		position: absolute;
		color: #fff;
		text-align: center;
		display: flex;
		align-items: center;
		justify-content: center;
		z-index: 1;
	}
	.glass-panel .label {
		position: relative;
		z-index: 2;
		font-weight: 600;
		text-shadow: 0 1px 4px rgba(0,0,0,0.3);
		pointer-events: none;
	}

	.glass-1 {
		padding:30px;
		top: 28%;
		left: 15%;
		font-size: 1.3em;
	}
	.glass-2 {
		width: 300px;
		height: 360px;
		top: 35%;
		right: 15%;
		font-size: 1.5em;
	}
	.glass-3 {
		padding:30px;
		bottom: 15%;
		left: 50%;
		transform: translateX(-50%);
		font-size: 1.1em;
	}

	/* ── Overlay content above glass (non-glass, high z-index) ── */
	.overlay-badge {
		position: absolute;
		top: 20px;
		right: 20px;
		background: rgba(255, 255, 255, 0.15);
		backdrop-filter: blur(6px);
		-webkit-backdrop-filter: blur(6px);
		padding: 8px 16px;
		border-radius: 20px;
		color: #fff;
		font-size: 0.85em;
		z-index: 10;
	}
	.fps-counter {
		position: absolute;
		top: 20px;
		left: 20px;
		background: rgba(0, 0, 0, 0.5);
		backdrop-filter: blur(6px);
		-webkit-backdrop-filter: blur(6px);
		padding: 6px 14px;
		border-radius: 16px;
		color: #0f0;
		font-size: 0.85em;
		font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
		z-index: 10;
	}
</style>
</head>
<body>

<div id="liquid-glass-root">
	<!-- Background image — drawn directly via ctx.drawImage (no html-to-image) -->
	<img class="background-img" src="background.png" alt="">

	<!-- Dynamic bubbles layer — a <canvas> direct child, captured every frame -->
	<canvas id="bubbles-canvas" data-dynamic></canvas>

	<!-- Text content -->
	<div class="main-content">
		<h1>Liquid Glass</h1>
		<p class="subtitle">A WebGL glass effect library for the web</p>
	</div>

	<!-- Glass elements -->
	<div class="glass-panel glass-1 liquid-glass">
		<span class="label">Regular Panel</span>
	</div>
	<div class="glass-panel glass-2 liquid-glass">
		<span class="label">Dark Glass</span>
	</div>
	<div class="glass-panel glass-3 liquid-glass">
		<span class="label">Frosted Panel</span>
	</div>

	<!-- Non-glass static content -->
	<div class="decoration">Made with LiquidGlass</div>

	<!-- Non-glass overlay ABOVE glass (tests stacking) -->
	<div class="overlay-badge">Library Demo</div>
	<div class="fps-counter" id="fps-counter">-- FPS</div>
</div>

<script>
	// ── Bouncing bubbles on a full-screen canvas (dynamic layer) ──
	(function () {
		const canvas = document.getElementById('bubbles-canvas');
		const ctx = canvas.getContext('2d');
		const BUBBLE_COUNT = 60;
		const bubbles = [];

		function resize() {
			canvas.width = window.innerWidth * devicePixelRatio;
			canvas.height = window.innerHeight * devicePixelRatio;
		}
		resize();
		window.addEventListener('resize', resize);

		// Create bubbles with random properties
		for (let i = 0; i < BUBBLE_COUNT; i++) {
			const radius = 8 + Math.random() * 40;
			bubbles.push({
				x: Math.random() * canvas.width,
				y: Math.random() * canvas.height,
				r: radius,
				vx: (Math.random() - 0.5) * 2.5,
				vy: (Math.random() - 0.5) * 2.5,
				color: `hsla(${Math.random() * 360}, 70%, 65%, ${0.25 + Math.random() * 0.35})`,
			});
		}

		function animate() {
			const dpr = devicePixelRatio || 1;
			const w = canvas.width;
			const h = canvas.height;
			ctx.clearRect(0, 0, w, h);

			for (const b of bubbles) {
				// Move
				b.x += b.vx * dpr;
				b.y += b.vy * dpr;

				// Bounce off edges
				if (b.x - b.r < 0)     { b.x = b.r;     b.vx = Math.abs(b.vx); }
				if (b.x + b.r > w)      { b.x = w - b.r; b.vx = -Math.abs(b.vx); }
				if (b.y - b.r < 0)      { b.y = b.r;     b.vy = Math.abs(b.vy); }
				if (b.y + b.r > h)      { b.y = h - b.r; b.vy = -Math.abs(b.vy); }

				// Draw
				ctx.beginPath();
				ctx.arc(b.x, b.y, b.r * dpr, 0, Math.PI * 2);
				ctx.fillStyle = b.color;
				ctx.fill();
			}

			requestAnimationFrame(animate);
		}
		requestAnimationFrame(animate);
	})();
</script>

<script type="module">
	import { LiquidGlass } from './dist/index.js';

	// Grab glass elements
	const glassElements = document.querySelectorAll('.liquid-glass');

	// Configure each glass element via dataset
	glassElements[0].dataset.config = JSON.stringify({
		blurAmount: 0,
		floating: true,
		cornerRadius: 40,
	});
	glassElements[1].dataset.config = JSON.stringify({
		brightness: -0.3,
		frostAmount: 0.95,
		floating: true,
		cornerRadius: 50,
		saturation: -0.3,
	});
	glassElements[2].dataset.config = JSON.stringify({
		blurAmount: 0.25,
		frostAmount: 1,
		floating: true,
		cornerRadius: 30,
	});

	// Initialise (async — pre-captures glass content before first render)
	const instance = await LiquidGlass.init({
		root: document.querySelector('#liquid-glass-root'),
		glassElements: glassElements,
	});

	// FPS display
	const fpsEl = document.getElementById('fps-counter');
	setInterval(() => {
		fpsEl.textContent = instance.fps + ' FPS';
	}, 500);

	// The instance can be destroyed later with:
	// instance.destroy();
</script>
</body>
</html>
